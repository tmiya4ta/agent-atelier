openapi: 3.0.3
info:
  title: atelier-mcp-mdm
  description: |
    MDM MCP Server for the Atelier demo.
    Speaks the official MCP wire protocol (JSON-RPC 2.0 over HTTP) on POST /mcp:
    initialize / tools/list / tools/call.
    Also retains the legacy custom HTTP-RPC (GET /mcp/tools, POST /mcp/execute)
    for back-compat with existing demo callers.
    Backed by mdm-ix-system (step2) directly via HTTP.
  version: 1.0.0

servers:
  - url: http://localhost:8081
  - url: https://atelier-mcp-mdm.cloudhub.io

tags:
  - name: mcp-jsonrpc
  - name: mcp-legacy
  - name: ops

paths:
  /mcp:
    post:
      tags: [mcp-jsonrpc]
      operationId: jsonRpc
      summary: MCP JSON-RPC 2.0 entry (initialize / tools/list / tools/call)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonRpcRequest'
      responses:
        '200':
          description: JSON-RPC response (result or error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
    get:
      tags: [mcp-jsonrpc]
      operationId: jsonRpcStream
      summary: MCP Streamable HTTP server-stream endpoint (no notifications — returns 405)
      responses:
        '405':
          description: Server-initiated stream not supported

  /mcp/tools:
    get:
      tags: [mcp-legacy]
      operationId: listTools
      responses:
        '200':
          description: ツール定義 (legacy custom shape)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolsManifest'

  /mcp/execute:
    post:
      tags: [mcp-legacy]
      operationId: executeTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteRequestBase'
      responses:
        '200':
          description: 実行結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /health:
    get:
      tags: [ops]
      operationId: health
      responses:
        '200':
          description: 正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

components:
  schemas:
    JsonRpcRequest:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc: { type: string, example: "2.0" }
        id: { oneOf: [{ type: string }, { type: integer }] }
        method: { type: string, example: "tools/list" }
        params:
          type: object
          additionalProperties: true
    JsonRpcResponse:
      type: object
      required: [jsonrpc]
      properties:
        jsonrpc: { type: string }
        id: { oneOf: [{ type: string }, { type: integer }, { type: "null" }] }
        result:
          type: object
          additionalProperties: true
        error:
          type: object
          properties:
            code: { type: integer }
            message: { type: string }
    ToolsManifest:
      type: object
      required: [tools]
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
    ToolDefinition:
      type: object
      required: [name, description, input_schema]
      properties:
        name: { type: string }
        description: { type: string }
        input_schema:
          type: object
          additionalProperties: true
    ExecuteRequestBase:
      type: object
      required: [toolName, input]
      properties:
        toolName: { type: string }
        input:
          type: object
          additionalProperties: true
    ExecuteResponse:
      type: object
      required: [status, tool, result]
      properties:
        status:
          type: string
          enum: [success, error]
        tool: { type: string }
        result:
          type: object
          additionalProperties: true
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    Health:
      type: object
      required: [status, app]
      properties:
        status: { type: string, example: UP }
        app: { type: string, example: atelier-mcp-mdm }
  responses:
    BadRequest:
      description: 入力不正
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

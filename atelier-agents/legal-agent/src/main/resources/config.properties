app.name=atelier-legal-agent

# A2A server endpoint exposed under this base path. /.well-known/agent-card.json
# is served automatically by the A2A connector. JSON-RPC endpoint = ${a2a.path}.
a2a.path=/

# Public URL — what shows up in agent-card.url. Atelier follows it for JSON-RPC POST.
# CH2 rootps shard = znutqp.pnwfdv.jpn-e1.cloudhub.io.
# Local mvn mule:run の場合は -Dagent.public.url=http://127.0.0.1:8081/ で上書き。
agent.public.url=https://atelier-legal-agent-znutqp.pnwfdv.jpn-e1.cloudhub.io/

# HTTP listener port. CH2 ingress hardcodes 8081.
http.listener.port=8081

# LLM proxy (MuleSoft demos OpenAI-compatible). Auth header is "Basic <token>"
# (the value is already base64-encoded clientId:clientSecret — do NOT base64 it again).
# Pass via mvn mule:run -Dllm.token=...
llm.endpoint=https://openai-proxy.demos.mulesoft.com/openai/v1
llm.model=gpt-5-mini
llm.token=OVERRIDE_VIA_DEPLOY_PROPERTY
llm.max_tokens=2048
llm.timeout=120000
agent.max_loops=10

# MCP backends — same CH2.0 hosts that step2 used.
mcp.contract.protocol=HTTPS
mcp.contract.host=contract-mcp-df8af0.xdfpbh.jpn-e1.cloudhub.io
mcp.contract.port=443

mcp.mdm.protocol=HTTPS
mcp.mdm.host=mdm-mcp-df8af0.xdfpbh.jpn-e1.cloudhub.io
mcp.mdm.port=443

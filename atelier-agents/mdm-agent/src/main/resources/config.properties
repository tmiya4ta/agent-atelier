app.name=atelier-mdm-agent

# A2A server endpoint exposed under this base path. /.well-known/agent-card.json
# is served automatically by the A2A connector. JSON-RPC endpoint = ${a2a.path}.
a2a.path=/

# Public URL — what shows up in agent-card.url. Atelier follows it for JSON-RPC POST.
# CH2 rootps shard = znutqp.pnwfdv.jpn-e1.cloudhub.io.
agent.public.url=https://atelier-mdm-agent-znutqp.pnwfdv.jpn-e1.cloudhub.io/

# HTTP listener port. CH2 ingress hardcodes 8081.
http.listener.port=8081

# LLM proxy (MuleSoft demos OpenAI-compatible). Auth header is "Basic <token>".
llm.endpoint=https://openai-proxy.demos.mulesoft.com/openai/v1
llm.model=gpt-5-mini
llm.token=OVERRIDE_VIA_DEPLOY_PROPERTY
llm.max_tokens=4096
llm.timeout=120000
agent.max_loops=10

# MCP backend — atelier-mcp-mdm (公式 MCP server) の legacy /mcp/execute endpoint。
# 同じ host を /mcp/tools (legacy) にも /mcp (JSON-RPC) にも露出している。
# 既存 dispatcher と互換のため legacy の方を叩く。
mcp.mdm.protocol=HTTPS
mcp.mdm.host=atelier-mcp-mdm-znutqp.pnwfdv.jpn-e1.cloudhub.io
mcp.mdm.port=443

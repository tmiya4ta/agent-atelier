<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Atelier · OAuth callback</title>
  <style>
    :root {
      --paper: #F5F3EE;
      --ink: #0E0E0C;
      --ink-3: #6B6862;
      --line: #E1DDD2;
      --accent: #2D4BFF;
      --warn: #C9421C;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: "Geist", system-ui, sans-serif;
      display: grid; place-items: center;
      text-align: center;
    }
    .card {
      padding: 30px 36px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 12px 30px -12px rgba(0,0,0,0.10);
      min-width: 320px;
    }
    .eyebrow {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 8px;
    }
    h1 {
      font-family: "Source Serif 4", "Iowan Old Style", serif;
      font-size: 26px;
      font-weight: 400;
      margin: 0 0 16px;
    }
    .spinner {
      width: 24px; height: 24px; margin: 12px auto 0;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err   { color: var(--warn); }
    .mono  { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-3); margin-top: 12px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow" id="eyebrow">oauth callback</div>
    <h1 id="title">Authenticating…</h1>
    <div class="spinner" id="spinner"></div>
    <p class="mono" id="meta"></p>
  </div>
  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const payload = {
        type: "oauth-callback",
        code:              params.get("code")              || null,
        state:             params.get("state")             || null,
        error:             params.get("error")             || null,
        error_description: params.get("error_description") || null
      };

      const $title  = document.getElementById("title");
      const $meta   = document.getElementById("meta");
      const $spin   = document.getElementById("spinner");
      const $eye    = document.getElementById("eyebrow");

      if (!window.opener || window.opener.closed) {
        $title.textContent = "Cannot post back to parent";
        $title.classList.add("err");
        $spin.remove();
        $meta.textContent = JSON.stringify(payload);
        return;
      }
      window.opener.postMessage(payload, location.origin);

      if (payload.error) {
        $title.textContent = "Authentication failed";
        $title.classList.add("err");
        $eye.textContent = "error";
        $spin.remove();
        $meta.textContent = payload.error + (payload.error_description ? " · " + payload.error_description : "");
        return;
      }

      $title.textContent = "Connected · closing window";
      setTimeout(() => { try { window.close(); } catch (e) {} }, 400);
    })();
  </script>
</body>
</html>
